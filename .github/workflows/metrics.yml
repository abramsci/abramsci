name: Metrics
on:
  schedule: [{cron: "55 9 * * 5"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: UTC
          base: header, repositories
          plugin_languages: yes
          plugin_notable: yes
          plugin_activity: yes
          config_display: large
